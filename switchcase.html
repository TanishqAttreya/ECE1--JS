<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document</title>
</head>
<body>
<script type="text/javascript">
var grade = 'C';
switch(grade){
    case 'A':
        document.write("Excellent");
        break;
    case 'B':
        document.write("Good");
        break;
    case 'C':
        document.write("Average");
        break;
    default:
        document.write("Invalid grade");}
</script>
</body>
</html>
