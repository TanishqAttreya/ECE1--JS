<!DOCTYPE html>
<html>
<head>
    <title>Mouse Events</title>
</head>
<body>
<div id="box" style="width:200px;height:200px;border:2px solid black;text-align:center;line-height:200px;margin:20px;">
    Try Me
</div>
<button onclick="clickEvent()">Click</button>
<br><br>
<button ondblclick="doubleClickEvent()">Double Click</button>
<br><br>
<button onmouseover="mouseOverEvent()">Mouse Over</button>
<br><br>
<button onmouseout="mouseOutEvent()">Mouse Out</button>
<br><br>
<button onmousedown="mouseDownEvent()">Mouse Down</button>
<br><br>
<button onmouseup="mouseUpEvent()">Mouse Up</button>
<br><br>
<button onmousemove="mouseMoveEvent()">Mouse Move</button>
<script src="script.js"></script>
</body>
</html>
